# headscale configuration example
# Copy this file to config.yaml and adjust to your needs

# The url clients will connect to.
server_url: https://headscale.example.com:8080

# Address to listen on. Change to 0.0.0.0 to listen on all interfaces.
listen_addr: 127.0.0.1:8080

# Address to listen for gRPC.
grpc_listen_addr: 127.0.0.1:50443

# Allow the gRPC admin interface to run in PLAINTEXT mode. This is strongly
# discouraged and should only be used for testing.
grpc_allow_insecure: false

# Private key used to encrypt traffic between headscale and clients.
private_key_path: /var/lib/headscale/private.key

# Pre-shared key used to encrypt noise traffic.
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# List of IP prefixes to allocate tailaddresses from.
ip_prefixes:
  - fd7a:115c:a1e0::/48
  - 100.64.0.0/10

# DERP (Detoured Encrypted Routing Protocol) configuration.
derp:
  server:
    enabled: false
    region_id: 999
    region_code: headscale
    region_name: Headscale Embedded DERP
    stun_listen_addr: "0.0.0.0:3478"
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  paths: []
  auto_update_enabled: true
  update_frequency: 24h

# Disables the automatic check for headscale updates on startup.
disable_check_updates: false

# Time before an inactive ephemeral node is deleted.
ephemeral_node_inactivity_timeout: 30m

# Database configuration.
db_type: sqlite3
db_path: /var/lib/headscale/db.sqlite

# TLS configuration.
tls_letsencrypt_hostname: ""
tls_letsencrypt_cache_dir: /var/lib/headscale/cache
tls_letsencrypt_challenge_type: HTTP-01
tls_letsencrypt_listen: ":http"
tls_cert_path: ""
tls_key_path: ""

# Logging configuration.
log:
  format: text
  level: info

# Policy (ACL) configuration.
acl_policy_path: ""

# DNS configuration.
dns_config:
  override_local_dns: true
  nameservers:
    - 1.1.1.1
  domains: []
  magic_dns: true
  base_domain: example.com

# Unix socket used for the CLI to connect without authentication.
unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"

# OpenID Connect (OIDC) configuration.
oidc:
  only_start_if_oidc_is_available: true
  issuer: ""
  client_id: ""
  client_secret: ""
  expiry: 180d
  use_expiry_from_token: false
  scope:
    - openid
    - profile
    - email
  extra_params: {}
  allowed_domains: []
  allowed_users: []
  strip_email_domain: true

# Metrics configuration.
metrics_listen_addr: 127.0.0.1:9090

# Node update check interval.
node_update_check_interval: 10s
